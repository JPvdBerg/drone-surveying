<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f14" />
    <meta name="robots" content="noindex" />
    <title>Page not found | JDHoffman Aerial Solutions</title>
    <link rel="icon" type="image/svg+xml" href="/drone-surveying/favicon.svg" />
    <style>
      /* Self-contained styles: this page is served by the host, not the React app. */
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background: #0a0f14;
        color: #cdd8e2;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-align: center;
      }
      .wrap { max-width: 32rem; }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.75rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #ff8a4d;
      }
      .dot { width: 0.4rem; height: 0.4rem; border-radius: 9999px; background: #ff6a1a; }
      h1 { margin: 1rem 0 0; font-size: clamp(2.5rem, 12vw, 4rem); color: #fff; letter-spacing: -0.02em; }
      p { margin: 0.75rem 0 0; font-size: 1.05rem; line-height: 1.6; color: #aebccb; }
      .actions { margin-top: 2rem; display: flex; flex-direction: column; gap: 0.75rem; }
      @media (min-width: 480px) { .actions { flex-direction: row; justify-content: center; } }
      a.btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 1.75rem;
        border-radius: 0.5rem;
        font-weight: 600;
        text-decoration: none;
        transition: background-color 0.2s, transform 0.1s;
      }
      a.btn:active { transform: scale(0.97); }
      .btn-primary { background: #ff6a1a; color: #0a0f14; }
      .btn-primary:hover { background: #e85b10; }
      .btn-ghost { border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; }
      .btn-ghost:hover { background: rgba(255, 255, 255, 0.05); }
    </style>
  </head>
  <body>
    <main class="wrap">
      <span class="badge"><span class="dot"></span>Error 404</span>
      <h1>Off the map.</h1>
      <p>
        That page doesn't exist, or it has moved. Let's get you back on course,
        head home or send us your project details for a quote.
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="/drone-surveying/">Back to home</a>
        <a class="btn btn-ghost" href="/drone-surveying/#contact">Request a quote</a>
      </div>
    </main>
  </body>
</html>
