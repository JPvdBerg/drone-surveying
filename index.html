      Local Business structured data for local SEO (Google rich results).
      REPLACE every "REPLACE_WITH_*" placeholder with your real details.

    -->
    <script type="application/ld+json">

        "@type": "ProfessionalService",
        "additionalType": "https://www.wikidata.org/wiki/Q1058914",
