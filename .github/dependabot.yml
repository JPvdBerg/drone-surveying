version: 2
updates:
  # Patch CVEs in Vite/React/Tailwind and friends.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Skip breaking major upgrades (e.g. Tailwind 3->4, Vite 5->8). Those need a
    # deliberate, tested migration, not an automated PR. Security-critical majors
    # still surface via Dependabot security alerts.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      # Batch minor/patch bumps into one PR to cut review noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions in our workflows current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
