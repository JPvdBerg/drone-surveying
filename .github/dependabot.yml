version: 2
updates:
  # Patch CVEs in Vite/React/Tailwind and friends.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch minor/patch bumps into one PR to cut review noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions in our workflows current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
