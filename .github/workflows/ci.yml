name: CI

# Build check for pull requests. Make this a required status check under
# Settings > Branches > Branch protection so broken builds can't merge to main.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type-check and build
        run: npm run build
