name: Deploy to Firebase Hosting

# Auto-builds and deploys to Firebase Hosting on every push to main.
#
# One-time setup (generates the service account + repo secret for you):
#   firebase init hosting:github
# When prompted, point it at this repo and let it set up the workflow secret
# named FIREBASE_SERVICE_ACCOUNT_JDHOFFMAN. (Or create a service-account key in
# the Google Cloud console and add it as that repo secret manually.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JDHOFFMAN }}
          projectId: jdhoffman-aerial-solutions
          channelId: live
